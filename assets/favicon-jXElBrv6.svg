  <!-- Compare arrow -->
  <g transform="translate(37, 42)">
    <path d="M 0 3 L 3 0 L 3 6 Z" fill="#818cf8"/>
    <path d="M 6 0 L 6 6" stroke="#818cf8" stroke-width="1" fill="none"/>
    <path d="M 12 3 L 9 6 L 9 0 Z" fill="#818cf8"/>
