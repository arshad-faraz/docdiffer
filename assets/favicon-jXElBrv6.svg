  </defs>
  <rect class="icon-bg" width="100" height="100" rx="20"/>
  <g transform="translate(15, 20)">
    <!-- Left document -->
    <rect class="icon-border" x="0" y="0" width="28" height="45" rx="2" fill="#4ade80" opacity="0.8"/>
    <rect class="icon-doc" x="2" y="2" width="24" height="6" rx="1"/>
    <rect class="icon-doc" x="2" y="10" width="24" height="4" rx="1" opacity="0.6"/>
    <rect class="icon-doc" x="2" y="16" width="24" height="4" rx="1" opacity="0.6"/>
    <rect class="icon-doc" x="2" y="22" width="15" height="4" rx="1" opacity="0.6"/>
  </g>
  <g transform="translate(50, 20)">
    <!-- Right document -->
    <rect class="icon-border" x="0" y="0" width="28" height="45" rx="2" fill="#f87171" opacity="0.8"/>
    <rect class="icon-doc" x="2" y="2" width="24" height="6" rx="1"/>
    <rect class="icon-doc" x="2" y="10" width="24" height="4" rx="1" opacity="0.6"/>
    <rect class="icon-doc" x="2" y="16" width="12" height="4" rx="1" opacity="0.6"/>
    <rect class="icon-doc" x="2" y="22" width="24" height="4" rx="1" opacity="0.6"/>
    <rect class="icon-doc" x="2" y="28" width="18" height="4" rx="1" opacity="0.6"/>
