<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocDiffer - Document Comparison Tool</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f1117;
        color: #e2e4ed;
        padding: 2rem;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        text-align: center;
      }
      h1 { font-size: 2.5rem; margin-bottom: 1rem; }
      p { font-size: 1.1rem; color: #a8adb8; margin-bottom: 2rem; }
      .status {
        background: #1a1d27;
        padding: 2rem;
        border-radius: 8px;
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔄 DocDiffer</h1>
      <p>Document Comparison Tool</p>
      <div class="status">
        <p>✅ Successfully deployed!</p>
        <p style="font-size: 0.9rem; margin-top: 1rem;">Full feature implementation coming soon.</p>
      </div>
    </div>
  </body>
</html>
